name: CI
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'vitest.config.*'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'vitest.config.*'
      - '.github/workflows/ci.yml'
jobs:
  unit-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Write .env.test from secrets
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          TEST_EMAIL2: ${{ secrets.TEST_EMAIL2 }}
          TEST_PASSWORD2: ${{ secrets.TEST_PASSWORD2 }}
        run: |
          printf 'TEST_EMAIL=%s\nTEST_PASSWORD=%s\nIMAP_HOST=%s\nIMAP_PORT=%s\nSMTP_HOST=%s\nSMTP_PORT=%s\nTEST_EMAIL2=%s\nTEST_PASSWORD2=%s\n' \
            "$TEST_EMAIL" "$TEST_PASSWORD" "$IMAP_HOST" "$IMAP_PORT" "$SMTP_HOST" "$SMTP_PORT" "$TEST_EMAIL2" "$TEST_PASSWORD2" \
            > .env.test
      - run: npm test

  e2e:
    runs-on: ubuntu-22.04
    needs: unit-integration
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            src-tauri/target
          key: rust-e2e-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-e2e-

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev libglib2.0-dev libdbus-1-dev \
            libsecret-1-dev patchelf xvfb

      - run: npm ci

      - name: Build Vite frontend
        run: npx vite build

      - name: Create stub external binary for Linux build
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/mailvault-server-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/mailvault-server-x86_64-unknown-linux-gnu

      - name: Build Tauri debug binary with WebDriver feature
        run: cd src-tauri && cargo build --features webdriver
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Install tauri-wd
        run: cargo install tauri-webdriver-automation --locked

      - name: Write .env.test from secrets
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          TEST_EMAIL2: ${{ secrets.TEST_EMAIL2 }}
          TEST_PASSWORD2: ${{ secrets.TEST_PASSWORD2 }}
        run: |
          printf 'TEST_EMAIL=%s\nTEST_PASSWORD=%s\nIMAP_HOST=%s\nIMAP_PORT=%s\nSMTP_HOST=%s\nSMTP_PORT=%s\nTEST_EMAIL2=%s\nTEST_PASSWORD2=%s\n' \
            "$TEST_EMAIL" "$TEST_PASSWORD" "$IMAP_HOST" "$IMAP_PORT" "$SMTP_HOST" "$SMTP_PORT" "$TEST_EMAIL2" "$TEST_PASSWORD2" \
            > .env.test

      - name: Run E2E tests
        env:
          TAURI_APP_BINARY: ${{ github.workspace }}/src-tauri/target/debug/mail-vault
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npx wdio run wdio.conf.js

      - name: Upload visual diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: tests/visual/.tmp/
          retention-days: 7
