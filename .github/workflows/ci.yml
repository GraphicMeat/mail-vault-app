name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'vitest.config.*'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'vitest.config.*'
      - '.github/workflows/ci.yml'
jobs:
  unit-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Check version consistency
        run: bash scripts/check-version-consistency.sh
      - name: Write .env.test from secrets
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          TEST_EMAIL2: ${{ secrets.TEST_EMAIL2 }}
          TEST_PASSWORD2: ${{ secrets.TEST_PASSWORD2 }}
        run: |
          printf 'TEST_EMAIL=%s\nTEST_PASSWORD=%s\nIMAP_HOST=%s\nIMAP_PORT=%s\nSMTP_HOST=%s\nSMTP_PORT=%s\nTEST_EMAIL2=%s\nTEST_PASSWORD2=%s\n' \
            "$TEST_EMAIL" "$TEST_PASSWORD" "$IMAP_HOST" "$IMAP_PORT" "$SMTP_HOST" "$SMTP_PORT" "$TEST_EMAIL2" "$TEST_PASSWORD2" \
            > .env.test
      - run: npm test

  # E2E tests disabled — requires persisted app state and working WebDriver window
  # lifecycle that CI headless Linux doesn't provide. UI tests fail because the app
  # starts with no accounts and the WebDriver can't find window handles reliably.
  # Re-enable when tests are refactored with CI-compatible fixtures.
  # See: tests/e2e/ for local-only test suites (npm run test:e2e:ui)
