name: Promote Snaps

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to promote (e.g. v2.3.2)'
        required: true
        type: string
      channel:
        description: 'Snap Store channel to publish to'
        required: false
        type: choice
        options:
          - stable
          - candidate
          - beta
          - edge
        default: stable

jobs:
  promote:
    # Auto-publish on release publish, but never for prereleases.
    if: github.event_name == 'workflow_dispatch' || !github.event.release.prerelease
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Download snaps from GitHub release
        id: download
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version || github.event.release.tag_name }}
        run: |
          VERSION="v${INPUT_VERSION#v}"

          echo "Downloading snap artifacts from release ${VERSION}..."
          if ! gh release download "$VERSION" \
            --repo "${{ github.repository }}" \
            --pattern "*.snap" \
            --dir snaps; then
            echo "No snap assets on release ${VERSION} — nothing to promote."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"

          echo "Downloaded snaps:"
          ls -lh snaps/

      - name: Publish to Snap Store
        if: steps.download.outputs.found == 'true'
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          CHANNEL: ${{ inputs.channel || 'stable' }}
        run: |
          if [ -z "$SNAPCRAFT_STORE_CREDENTIALS" ]; then
            echo "::error::SNAPCRAFT_STORE_CREDENTIALS not set"
            exit 1
          fi
          for snap in snaps/*.snap; do
            echo "Publishing $(basename "$snap") to ${CHANNEL} channel..."
            snapcraft upload "$snap" --release="${CHANNEL}"
          done
          echo "All snaps published to ${CHANNEL}."
