name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.2)'
        required: true
        type: string

jobs:
  build-macos:
    permissions:
      contents: write
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          brew install rustup
          rustup-init -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-universal-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-universal-cargo-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Set up Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "actions" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "actions" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "actions" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Build universal server sidecar
        run: |
          mkdir -p src-tauri/binaries

          # Build ARM64 natively
          bun build server/index.js --compile --outfile src-tauri/binaries/mailvault-server-aarch64-apple-darwin
          chmod +x src-tauri/binaries/mailvault-server-aarch64-apple-darwin

          # Download x86_64 Bun and build x86_64 sidecar
          curl -fsSL -o /tmp/bun-x64.zip "https://github.com/oven-sh/bun/releases/latest/download/bun-darwin-x64.zip"
          unzip -o /tmp/bun-x64.zip -d /tmp/bun-x64
          arch -x86_64 /tmp/bun-x64/bun-darwin-x64/bun build server/index.js --compile --outfile src-tauri/binaries/mailvault-server-x86_64-apple-darwin
          chmod +x src-tauri/binaries/mailvault-server-x86_64-apple-darwin

          # Create universal binary
          lipo -create \
            src-tauri/binaries/mailvault-server-aarch64-apple-darwin \
            src-tauri/binaries/mailvault-server-x86_64-apple-darwin \
            -output src-tauri/binaries/mailvault-server-universal-apple-darwin
          chmod +x src-tauri/binaries/mailvault-server-universal-apple-darwin

          echo "Universal binary:"
          file src-tauri/binaries/mailvault-server-universal-apple-darwin

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build, sign, notarize, and package
        env:
          CI: 'true'
          BUILD_TARGET: universal-apple-darwin
          SKIP_SERVER_BUILD: 'true'
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/build-developer-id.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/MailVault-*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/MailVault.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/MailVault.app.tar.gz.sig
          retention-days: 1

  build-linux-x86_64:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            libfuse2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-x86_64-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            linux-x86_64-cargo-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build server sidecar
        env:
          TAURI_TARGET: x86_64-unknown-linux-gnu
        run: npm run build:server

      - name: Build Linux x86_64
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target x86_64-unknown-linux-gnu --bundles deb

      - name: Upload Linux x86_64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-artifacts
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          retention-days: 1

  build-linux-aarch64:
    permissions:
      contents: write
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            libfuse2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-aarch64-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            linux-aarch64-cargo-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build server sidecar
        env:
          TAURI_TARGET: aarch64-unknown-linux-gnu
        run: npm run build:server

      - name: Build Linux aarch64
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target aarch64-unknown-linux-gnu --bundles deb

      - name: Upload Linux aarch64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64-artifacts
          path: |
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
          retention-days: 1

  create-release:
    needs: [build-macos, build-linux-x86_64, build-linux-aarch64]
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build latest.json and create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          VERSION_NUM="${VERSION#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"

          echo "=== Artifacts collected ==="
          find artifacts/ -type f | sort
          echo "=========================="

          # ── macOS ──
          MACOS_TAR=$(find artifacts/macos-artifacts -name "*.tar.gz" ! -name "*.sig" | head -1)
          MACOS_TAR_NAME=$(basename "$MACOS_TAR")
          MACOS_SIG=$(cat "${MACOS_TAR}.sig" 2>/dev/null || echo "")

          # ── Linux x86_64 (.deb) ──
          LX86_DEB=$(find artifacts/linux-x86_64-artifacts -name "*.deb" | head -1)
          LX86_DEB_NAME=$(basename "$LX86_DEB")

          # ── Linux aarch64 (.deb) ──
          LARM_DEB=$(find artifacts/linux-aarch64-artifacts -name "*.deb" | head -1)
          LARM_DEB_NAME=$(basename "$LARM_DEB")

          cat > latest.json <<EOJSON
          {
            "version": "${VERSION_NUM}",
            "notes": "See the assets to download and install this version.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": { "signature": "${MACOS_SIG}", "url": "${BASE_URL}/${MACOS_TAR_NAME}" },
              "darwin-x86_64": { "signature": "${MACOS_SIG}", "url": "${BASE_URL}/${MACOS_TAR_NAME}" }
            }
          }
          EOJSON

          echo "Generated latest.json:"
          cat latest.json

          # Collect all upload files
          UPLOAD_FILES="latest.json"
          for f in $(find artifacts/ -type f); do
            UPLOAD_FILES="$UPLOAD_FILES $f"
          done

          gh release create "$VERSION" \
            --title "MailVault v${VERSION_NUM}" \
            --notes "See the assets to download and install this version." \
            --draft \
            $UPLOAD_FILES

          echo "Draft release created: $VERSION"
