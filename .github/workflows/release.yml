name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.2)'
        required: true
        type: string
      publish_snaps:
        description: 'Publish snaps to Snap Store (default: false — use Promote Snaps workflow instead)'
        required: false
        type: boolean
        default: false

jobs:
  # ── E2E Tests (disabled — uncomment to enable) ──
  # Runs UI-only E2E tests on macOS. Connected tests are skipped in CI
  # because they require IMAP accounts in the system keychain.
  # Uses tauri-webdriver-automation (macOS WKWebView only).
  #
  # e2e-tests:
  #   permissions:
  #     contents: read
  #   runs-on: macos-latest
  #   timeout-minutes: 30
  #
  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v4
  #
  #     - name: Install Rust stable
  #       uses: dtolnay/rust-toolchain@stable
  #
  #     - name: Cache Rust dependencies
  #       uses: actions/cache@v4
  #       with:
  #         path: |
  #           ~/.cargo/registry
  #           ~/.cargo/git
  #           src-tauri/target
  #         key: macos-e2e-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
  #         restore-keys: |
  #           macos-e2e-cargo-
  #
  #     - name: Install Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: 20
  #         cache: 'npm'
  #
  #     - name: Install frontend dependencies
  #       run: npm ci
  #
  #     - name: Install tauri-webdriver-automation
  #       run: cargo install tauri-webdriver-automation
  #
  #     - name: Build debug binary with WebDriver support
  #       run: npx tauri build --debug --features webdriver
  #
  #     - name: Run UI E2E tests
  #       run: npm run test:e2e:ui

  build-macos:
    permissions:
      contents: write
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          brew install rustup
          rustup-init -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-universal-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            macos-universal-cargo-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Set up Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "actions" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "actions" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "actions" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Build universal server sidecar
        run: |
          mkdir -p src-tauri/binaries

          # Build ARM64 natively
          bun build server/index.js --compile --outfile src-tauri/binaries/mailvault-server-aarch64-apple-darwin
          chmod +x src-tauri/binaries/mailvault-server-aarch64-apple-darwin

          # Download x86_64 Bun and build x86_64 sidecar
          curl -fsSL -o /tmp/bun-x64.zip "https://github.com/oven-sh/bun/releases/latest/download/bun-darwin-x64.zip"
          unzip -o /tmp/bun-x64.zip -d /tmp/bun-x64
          arch -x86_64 /tmp/bun-x64/bun-darwin-x64/bun build server/index.js --compile --outfile src-tauri/binaries/mailvault-server-x86_64-apple-darwin
          chmod +x src-tauri/binaries/mailvault-server-x86_64-apple-darwin

          # Create universal binary
          lipo -create \
            src-tauri/binaries/mailvault-server-aarch64-apple-darwin \
            src-tauri/binaries/mailvault-server-x86_64-apple-darwin \
            -output src-tauri/binaries/mailvault-server-universal-apple-darwin
          chmod +x src-tauri/binaries/mailvault-server-universal-apple-darwin

          echo "Universal server binary:"
          file src-tauri/binaries/mailvault-server-universal-apple-darwin

      - name: Build universal daemon sidecar
        run: |
          # Build ARM64
          cargo build -p mailvault-daemon --release --target aarch64-apple-darwin
          # Build x86_64
          cargo build -p mailvault-daemon --release --target x86_64-apple-darwin

          # Stage arch-specific binaries (Tauri needs these during per-arch compilation)
          cp target/aarch64-apple-darwin/release/mailvault-daemon src-tauri/binaries/mailvault-daemon-aarch64-apple-darwin
          cp target/x86_64-apple-darwin/release/mailvault-daemon src-tauri/binaries/mailvault-daemon-x86_64-apple-darwin
          chmod +x src-tauri/binaries/mailvault-daemon-aarch64-apple-darwin
          chmod +x src-tauri/binaries/mailvault-daemon-x86_64-apple-darwin

          # Create universal binary (used by the final app bundle)
          lipo -create \
            target/aarch64-apple-darwin/release/mailvault-daemon \
            target/x86_64-apple-darwin/release/mailvault-daemon \
            -output src-tauri/binaries/mailvault-daemon-universal-apple-darwin
          chmod +x src-tauri/binaries/mailvault-daemon-universal-apple-darwin

          echo "Daemon binaries:"
          file src-tauri/binaries/mailvault-daemon-*

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Download Sparkle framework
        run: bash scripts/download-sparkle.sh

      - name: Build, sign, notarize, and package
        env:
          CI: 'true'
          BUILD_TARGET: universal-apple-darwin
          SKIP_SERVER_BUILD: 'true'
          SPARKLE_FRAMEWORK_PATH: ${{ github.workspace }}/src-tauri
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/build-developer-id.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            target/universal-apple-darwin/release/bundle/dmg/MailVault-*.dmg
            target/universal-apple-darwin/release/bundle/dmg/appcast.xml
          retention-days: 1

  build-linux-x86_64:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            libfuse2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-x86_64-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            linux-x86_64-cargo-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build server sidecar
        env:
          TAURI_TARGET: x86_64-unknown-linux-gnu
        run: npm run build:server

      - name: Build Linux x86_64
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target x86_64-unknown-linux-gnu --bundles deb

      - name: Upload Linux x86_64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-artifacts
          path: |
            target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb.sig
          retention-days: 1

  build-linux-aarch64:
    permissions:
      contents: write
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            libfuse2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-aarch64-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            linux-aarch64-cargo-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build server sidecar
        env:
          TAURI_TARGET: aarch64-unknown-linux-gnu
        run: npm run build:server

      - name: Build Linux aarch64
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target aarch64-unknown-linux-gnu --bundles deb

      - name: Upload Linux aarch64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64-artifacts
          path: |
            target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
            target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb.sig
          retention-days: 1

  build-snap-x86_64:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            libfuse2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-x86_64-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            linux-x86_64-cargo-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build server sidecar
        env:
          TAURI_TARGET: x86_64-unknown-linux-gnu
        run: npm run build:server

      - name: Build Tauri binary
        run: npx tauri build --target x86_64-unknown-linux-gnu --no-bundle

      - name: Prepare snap staging
        env:
          TAURI_TARGET: x86_64-unknown-linux-gnu
        run: bash scripts/build-snap-staging.sh

      - name: Install snapcraft and GNOME extension snaps
        run: |
          sudo snap install snapcraft --classic
          sudo snap install gnome-42-2204 gnome-42-2204-sdk gtk-common-themes

      - name: Build snap
        run: snapcraft --destructive-mode

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: snap-x86_64-artifact
          path: "*.snap"
          retention-days: 1

  build-snap-aarch64:
    permissions:
      contents: write
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            libfuse2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-aarch64-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            linux-aarch64-cargo-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build server sidecar
        env:
          TAURI_TARGET: aarch64-unknown-linux-gnu
        run: npm run build:server

      - name: Build Tauri binary
        run: npx tauri build --target aarch64-unknown-linux-gnu --no-bundle

      - name: Prepare snap staging
        env:
          TAURI_TARGET: aarch64-unknown-linux-gnu
        run: bash scripts/build-snap-staging.sh

      - name: Install snapcraft and GNOME extension snaps
        run: |
          sudo snap install snapcraft --classic
          sudo snap install gnome-42-2204 gnome-42-2204-sdk gtk-common-themes

      - name: Build snap
        run: snapcraft --destructive-mode

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: snap-aarch64-artifact
          path: "*.snap"
          retention-days: 1

  publish-snaps:
    if: inputs.publish_snaps
    needs: [build-snap-x86_64, build-snap-aarch64]
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Download snap artifacts
        uses: actions/download-artifact@v4
        with:
          path: snaps
          pattern: snap-*-artifact

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Publish to Snap Store
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          if [ -z "$SNAPCRAFT_STORE_CREDENTIALS" ]; then
            echo "SNAPCRAFT_STORE_CREDENTIALS not set — skipping Snap Store publish"
            exit 0
          fi
          for snap in $(find snaps/ -name "*.snap"); do
            echo "Publishing: $snap"
            snapcraft upload "$snap" --release=stable
          done

  create-release:
    needs: [build-macos, build-linux-x86_64, build-linux-aarch64, build-snap-x86_64, build-snap-aarch64]
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build latest.json and create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          VERSION_NUM="${INPUT_VERSION#v}"
          VERSION="v${VERSION_NUM}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"

          echo "=== Artifacts collected ==="
          find artifacts/ -type f | sort
          echo "=========================="

          # ── macOS (Sparkle — uses appcast.xml, not latest.json) ──
          APPCAST=$(find artifacts/macos-artifacts -name "appcast.xml" | head -1)
          if [ -n "$APPCAST" ]; then
            cp "$APPCAST" appcast.xml
            echo "Found appcast.xml for macOS Sparkle updater"
          fi

          # ── Linux x86_64 (.deb) ──
          LX86_DEB=$(find artifacts/linux-x86_64-artifacts -name "*.deb" | head -1)
          LX86_DEB_NAME=$(basename "$LX86_DEB")
          LX86_SIG=$(find artifacts/linux-x86_64-artifacts -name "*.deb.sig" 2>/dev/null | head -1 || true)

          # ── Linux aarch64 (.deb) ──
          LARM_DEB=$(find artifacts/linux-aarch64-artifacts -name "*.deb" | head -1)
          LARM_DEB_NAME=$(basename "$LARM_DEB")
          LARM_SIG=$(find artifacts/linux-aarch64-artifacts -name "*.deb.sig" 2>/dev/null | head -1 || true)

          # ── Snap artifacts (may not exist if snap builds skipped) ──
          SNAP_X86=$(find artifacts/snap-x86_64-artifact -name "*.snap" 2>/dev/null | head -1 || true)
          SNAP_ARM=$(find artifacts/snap-aarch64-artifact -name "*.snap" 2>/dev/null | head -1 || true)

          # Extract changelog for this version from CHANGELOG.md
          CHANGELOG_NOTES=$(python3 -c "
          import re
          version = '${VERSION_NUM}'
          with open('CHANGELOG.md') as f:
              content = f.read()
          pattern = rf'^## \[{re.escape(version)}\].*?\n(.*?)(?=^## \[|\Z)'
          m = re.search(pattern, content, re.MULTILINE | re.DOTALL)
          print(m.group(1).strip() if m else 'Bug fixes and improvements.')
          ")
          # JSON-escape for latest.json (handles newlines, quotes, backslashes)
          CHANGELOG_JSON=$(python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip()))" <<< "$CHANGELOG_NOTES")

          # Build Linux platform entries for latest.json
          # (macOS uses Sparkle appcast.xml, not latest.json)
          LINUX_PLATFORMS=""
          if [ -n "$LX86_SIG" ]; then
            LX86_SIG_CONTENT=$(cat "$LX86_SIG")
            LINUX_PLATFORMS="\"linux-x86_64\": { \"signature\": \"${LX86_SIG_CONTENT}\", \"url\": \"${BASE_URL}/${LX86_DEB_NAME}\" }"
          fi
          if [ -n "$LARM_SIG" ]; then
            LARM_SIG_CONTENT=$(cat "$LARM_SIG")
            if [ -n "$LINUX_PLATFORMS" ]; then LINUX_PLATFORMS="${LINUX_PLATFORMS}, "; fi
            LINUX_PLATFORMS="${LINUX_PLATFORMS}\"linux-aarch64\": { \"signature\": \"${LARM_SIG_CONTENT}\", \"url\": \"${BASE_URL}/${LARM_DEB_NAME}\" }"
          fi

          cat > latest.json <<EOJSON
          {
            "version": "${VERSION_NUM}",
            "notes": ${CHANGELOG_JSON},
            "pub_date": "${PUB_DATE}",
            "platforms": { ${LINUX_PLATFORMS} }
          }
          EOJSON

          echo "Generated latest.json (Linux):"
          cat latest.json

          # Collect all upload files
          UPLOAD_FILES="latest.json"
          if [ -f "appcast.xml" ]; then
            UPLOAD_FILES="$UPLOAD_FILES appcast.xml"
          fi
          for f in $(find artifacts/ -type f); do
            # Skip appcast.xml from artifacts — already added from the copy above
            if [ "$(basename "$f")" = "appcast.xml" ]; then continue; fi
            UPLOAD_FILES="$UPLOAD_FILES $f"
          done

          gh release create "$VERSION" \
            --title "MailVault v${VERSION_NUM}" \
            --notes "${CHANGELOG_NOTES:-See the assets to download and install this version.}" \
            --draft \
            $UPLOAD_FILES

          echo "Draft release created: $VERSION"
