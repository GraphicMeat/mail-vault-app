name: Release (macOS Developer ID)

# Builds ONLY the sandboxed, Developer ID-signed, notarized macOS DMG and
# publishes it to a GitHub release. Includes the Sparkle auto-updater
# (framework + EdDSA-signed appcast.xml).
#
# This is the direct-distribution counterpart to release-appstore.yml. The
# Mac App Store build drops Sparkle (Cargo `--no-default-features`, no
# `sparkle` feature) and ships updates through the App Store instead.
#
# The release tag is derived from package.json (v<version>) so it matches the
# appcast enclosure URL that build-developer-id.sh embeds.

on:
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create the GitHub release as a draft'
        required: false
        type: boolean
        default: true

jobs:
  build-macos:
    permissions:
      contents: write
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          brew install rustup
          rustup-init -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-universal-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            macos-universal-cargo-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Set up Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "actions" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "actions" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "actions" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Build universal daemon sidecar
        run: |
          mkdir -p src-tauri/binaries
          cargo build -p mailvault-daemon --release --target aarch64-apple-darwin
          cargo build -p mailvault-daemon --release --target x86_64-apple-darwin

          cp target/aarch64-apple-darwin/release/mailvault-daemon src-tauri/binaries/mailvault-daemon-aarch64-apple-darwin
          cp target/x86_64-apple-darwin/release/mailvault-daemon src-tauri/binaries/mailvault-daemon-x86_64-apple-darwin
          chmod +x src-tauri/binaries/mailvault-daemon-aarch64-apple-darwin
          chmod +x src-tauri/binaries/mailvault-daemon-x86_64-apple-darwin

          lipo -create \
            target/aarch64-apple-darwin/release/mailvault-daemon \
            target/x86_64-apple-darwin/release/mailvault-daemon \
            -output src-tauri/binaries/mailvault-daemon-universal-apple-darwin
          chmod +x src-tauri/binaries/mailvault-daemon-universal-apple-darwin

          echo "Daemon binaries:"
          file src-tauri/binaries/mailvault-daemon-*

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Download Sparkle framework
        run: bash scripts/download-sparkle.sh

      - name: Build, sign, notarize, and package (Developer ID + Sparkle)
        env:
          CI: 'true'
          BUILD_TARGET: universal-apple-darwin
          SKIP_SERVER_BUILD: 'true'
          SPARKLE_FRAMEWORK_PATH: ${{ github.workspace }}/src-tauri
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/build-developer-id.sh

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRAFT: ${{ inputs.draft }}
        run: |
          set -e
          VERSION_NUM=$(grep '"version"' package.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          VERSION="v${VERSION_NUM}"
          DMG_DIR="target/universal-apple-darwin/release/bundle/dmg"

          DMG=$(find "$DMG_DIR" -name "*.dmg" | head -1)
          APPCAST="$DMG_DIR/appcast.xml"
          if [ -z "$DMG" ]; then
            echo "No DMG found in $DMG_DIR" >&2
            exit 1
          fi

          echo "Release tag:  $VERSION"
          echo "DMG:          $DMG"
          echo "Appcast:      $APPCAST"

          # Extract this version's notes from CHANGELOG.md
          CHANGELOG_NOTES=$(python3 -c "
          import re
          version = '${VERSION_NUM}'
          with open('CHANGELOG.md') as f:
              content = f.read()
          pattern = rf'^## \[{re.escape(version)}\].*?\n(.*?)(?=^## \[|\Z)'
          m = re.search(pattern, content, re.MULTILINE | re.DOTALL)
          print(m.group(1).strip() if m else 'Bug fixes and improvements.')
          ")

          UPLOAD_FILES="$DMG"
          [ -f "$APPCAST" ] && UPLOAD_FILES="$UPLOAD_FILES $APPCAST"

          DRAFT_FLAG=""
          if [ "${DRAFT:-true}" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi

          # Reuse the release if the tag already exists (e.g. created by the
          # full multi-platform Release workflow); otherwise create it.
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION exists — uploading macOS assets to it"
            gh release upload "$VERSION" $UPLOAD_FILES --clobber
          else
            gh release create "$VERSION" \
              --title "MailVault v${VERSION_NUM}" \
              --notes "${CHANGELOG_NOTES:-See the assets to download and install this version.}" \
              $DRAFT_FLAG \
              $UPLOAD_FILES
          fi

          echo "Done: $VERSION"
